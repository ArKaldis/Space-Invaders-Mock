<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Star Siege</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell">
    <section class="panel">
      <div class="hud">
        <div>
          <span class="label">Score</span>
          <strong id="score">0</strong>
        </div>
        <div>
          <span class="label">Lives</span>
          <strong id="lives">3</strong>
        </div>
        <div>
          <span class="label">Wave</span>
          <strong id="wave">1</strong>
        </div>
      </div>

      <canvas id="game" width="960" height="640" aria-label="Space arcade game"></canvas>

      <div class="footer">
        <p>`A` / `D` or arrow keys move, `Space` shoots, `Shift` dashes.</p>
        <button id="restart" type="button">Restart Mission</button>
      </div>
    </section>
  </main>

  <script src="game.js"></script>
</body>
</html>
